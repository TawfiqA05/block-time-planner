/* ---------- time helpers (minutes since midnight of plan day) ---------- */
const pad = n => String(n).padStart(2, "0");
const fmt = min => {
  const m = (Math.round(min) % 1440 + 1440) % 1440;
  let h = Math.floor(m / 60),
    mm = m % 60;
  const ap = h >= 12 ? "PM" : "AM";
  h = h % 12 === 0 ? 12 : h % 12;
  return `${h}:${pad(mm)} ${ap}`;
};
const toInputVal = min => {
  const m = (Math.round(min) % 1440 + 1440) % 1440;
  return `${pad(Math.floor(m / 60))}:${pad(m % 60)}`;
};
const fromInputVal = s => {
  if (!s) return null;
  const [h, m] = s.split(":").map(Number);
  return h * 60 + m;
};
const localKey = d => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
function icsForPlan(plan) {
  const d0 = plan.dateKey.replace(/-/g, "");
  const nd = new Date(plan.dateKey + "T12:00");
  nd.setDate(nd.getDate() + 1);
  const d1 = localKey(nd).replace(/-/g, "");
  const t = min => {
    const day = min >= 1440 ? d1 : d0;
    const m = (Math.round(min) % 1440 + 1440) % 1440;
    return `${day}T${pad(Math.floor(m / 60))}${pad(m % 60)}00`;
  };
  const esc = s => String(s || "").replace(/[,;]/g, " ");
  const ev = plan.blocks.filter(b => b.cat !== "sleep").map((b, i) => `BEGIN:VEVENT\r\nUID:btp-${plan.dateKey}-${i}@blocktime\r\nDTSTART:${t(b.start)}\r\nDTEND:${t(b.end)}\r\nSUMMARY:${esc(b.title)}\r\nDESCRIPTION:${esc(b.note)}\r\nEND:VEVENT`).join("\r\n");
  return `BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//blocktime//EN\r\n${ev}\r\nEND:VCALENDAR`;
}

/* ---------- drag reflow: keep anchors, re-time movables in new order ---------- */
const ANCHORED = {
  prayer: true,
  fixed: true,
  sleep: true
};
function reflowBlocks(orderIds, blocks, dayStart, draggedId) {
  const byId = {};
  blocks.forEach(b => {
    byId[b.id] = b;
  });
  const seq = orderIds.map(id => byId[id]).filter(Boolean);
  const anchors = seq.filter(b => ANCHORED[b.cat]);
  let t = dayStart;
  const out = [];
  for (const b of seq) {
    if (ANCHORED[b.cat]) {
      out.push(b);
      t = Math.max(t, b.end + 5);
      continue;
    }
    const dur = Math.max(5, b.end - b.start);
    // only the dragged block gets fully re-timed; everything else keeps its
    // original start unless the new order genuinely forces a push
    let start = b.id === draggedId ? t : Math.max(b.start, t);
    for (let g = 0; g < 100; g++) {
      const clash = anchors.find(a => a.start < start + dur && a.end > start);
      if (!clash) break;
      start = clash.end + 5;
    }
    out.push({
      ...b,
      start,
      end: start + dur
    });
    t = start + dur + 5;
  }
  return out.sort((a, b) => a.start - b.start || a.end - b.end);
}

/* ---------- prayer time calculation (solar, no network) ---------- */
const METHODS = {
  ISNA: {
    fajr: 15,
    isha: 15,
    label: "ISNA (15° / 15°)"
  },
  MWL: {
    fajr: 18,
    isha: 17,
    label: "Muslim World League (18° / 17°)"
  }
};
function computePrayerTimes(dateObj, lat, lng, methodKey, asrFactor) {
  const rad = Math.PI / 180;
  const method = METHODS[methodKey] || METHODS.ISNA;
  const tz = -new Date(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate(), 12).getTimezoneOffset() / 60;
  const y = dateObj.getFullYear(),
    mo = dateObj.getMonth() + 1,
    d = dateObj.getDate();
  const a = Math.floor((14 - mo) / 12),
    yy = y + 4800 - a,
    mm = mo + 12 * a - 3;
  const jdn = d + Math.floor((153 * mm + 2) / 5) + 365 * yy + Math.floor(yy / 4) - Math.floor(yy / 100) + Math.floor(yy / 400) - 32045;
  const D = jdn - 2451545.0;
  const g = ((357.529 + 0.98560028 * D) % 360 + 360) % 360;
  const q = ((280.459 + 0.98564736 * D) % 360 + 360) % 360;
  const L = ((q + 1.915 * Math.sin(g * rad) + 0.02 * Math.sin(2 * g * rad)) % 360 + 360) % 360;
  const e = 23.439 - 0.00000036 * D;
  let RA = Math.atan2(Math.cos(e * rad) * Math.sin(L * rad), Math.cos(L * rad)) / rad / 15;
  RA = (RA % 24 + 24) % 24;
  const decl = Math.asin(Math.sin(e * rad) * Math.sin(L * rad)) / rad;
  let eqt = q / 15 - RA;
  eqt = eqt - 24 * Math.round(eqt / 24);
  const dhuhr = 12 + tz - lng / 15 - eqt;
  const hourAngle = angle => {
    const cosH = (-Math.sin(angle * rad) - Math.sin(lat * rad) * Math.sin(decl * rad)) / (Math.cos(lat * rad) * Math.cos(decl * rad));
    if (cosH < -1 || cosH > 1) return null;
    return Math.acos(cosH) / rad / 15;
  };
  const asrAngle = -Math.atan(1 / (asrFactor + Math.tan(Math.abs(lat - decl) * rad))) / rad;
  const tF = hourAngle(method.fajr),
    tR = hourAngle(0.833),
    tI = hourAngle(method.isha);
  const tA = hourAngle(asrAngle);
  const toMin = h => h == null ? null : Math.round((h % 24 + 24) % 24 * 60);
  return {
    fajr: toMin(tF != null ? dhuhr - tF : dhuhr - 1.5),
    sunrise: toMin(tR != null ? dhuhr - tR : dhuhr - 1),
    dhuhr: toMin(dhuhr + 2 / 60),
    asr: toMin(tA != null ? dhuhr + tA : dhuhr + 4),
    maghrib: toMin(tR != null ? dhuhr + tR : dhuhr + 1),
    isha: toMin(tI != null ? dhuhr + tI : dhuhr + 1.5)
  };
}

/* ---------- persistent storage ---------- */
async function sGet(key) {
  const client = getClient();
  if (client) {
    try {
      const {
        data: {
          user
        }
      } = await client.auth.getUser();
      if (user) {
        const {
          data,
          error
        } = await client.from("kv").select("value").eq("user_id", user.id).eq("key", key).maybeSingle();
        if (!error) {
          if (data) {
            try {
              localStorage.setItem(key, JSON.stringify(data.value));
            } catch {}
            return data.value;
          }
          return null;
        }
      }
    } catch (e) {
      console.error("cloud read failed — using this device's copy", e);
    }
  }
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : null;
  } catch {
    return null;
  }
}
async function sSet(key, val) {
  try {
    localStorage.setItem(key, JSON.stringify(val));
  } catch {}
  const client = getClient();
  if (client) {
    try {
      const {
        data: {
          user
        }
      } = await client.auth.getUser();
      if (user) {
        const {
          error
        } = await client.from("kv").upsert({
          user_id: user.id,
          key,
          value: val,
          updated_at: new Date().toISOString()
        });
        if (error) console.error("cloud save failed (saved on this device)", error.message);
      }
    } catch (e) {
      console.error("cloud save failed (saved on this device)", e);
    }
  }
}

/* ---------- the scheduler ---------- */
function buildSchedule(cfg) {
  const {
    wake,
    prayers,
    fixed,
    tasks,
    energy,
    workout,
    mealsCount,
    fasting,
    includeQuran,
    jumuah,
    weekday
  } = cfg;
  let sleep = cfg.sleep <= wake ? cfg.sleep + 1440 : cfg.sleep;
  const blocks = [];
  const occ = []; // padded occupied intervals

  const overlaps = (s, e) => occ.some(o => s < o.e && e > o.s);
  const inDay = (s, e) => s >= wake && e <= sleep;
  const fit = (dur, winS, winE, validate, backward = false) => {
    winS = Math.max(winS, wake);
    winE = Math.min(winE, sleep);
    if (winE - winS < dur) return null;
    const starts = [];
    for (let t = winS; t + dur <= winE; t += 5) starts.push(t);
    if (backward) starts.reverse();
    for (const t of starts) {
      if (!overlaps(t - 5, t + dur + 5) && (!validate || validate(t, t + dur))) return t;
    }
    // relax padding if nothing fit
    for (const t of starts) {
      if (!overlaps(t, t + dur) && (!validate || validate(t, t + dur))) return t;
    }
    return null;
  };
  const place = (b, pad = 5) => {
    blocks.push({
      id: uid(),
      ...b
    });
    occ.push({
      s: b.start - (b.cat === "prayer" ? 0 : pad),
      e: b.end + pad
    });
  };

  /* 1 — prayers: unhurried anchors with wudu buffer built in */
  const P = prayers;
  // Fajr
  if (P.fajr != null) {
    if (wake <= P.fajr) {
      place({
        title: "Fajr",
        cat: "prayer",
        start: Math.max(wake, P.fajr - 10),
        end: P.fajr + 25,
        note: "Wudu buffer built in — no rush"
      });
    } else if (wake < P.sunrise) {
      place({
        title: "Fajr",
        cat: "prayer",
        start: wake,
        end: wake + 25,
        note: `Pray on waking — sunrise at ${fmt(P.sunrise)}`
      });
    }
  }
  const isJumuah = jumuah && jumuah.on && weekday === 5 && jumuah.time != null;
  for (const [name, t] of [[isJumuah ? "Jumu'ah" : "Dhuhr", isJumuah ? jumuah.time : P.dhuhr], ["Asr", P.asr], ["Maghrib", P.maghrib], ["Isha", P.isha]]) {
    if (t == null) continue;
    let tt = t < wake ? t + 1440 : t;
    if (tt >= wake && tt <= sleep + 30) {
      const pre = name === "Jumu'ah" ? 30 : 10;
      const end = tt + (name === "Jumu'ah" ? 60 : 25);
      if (end > sleep) sleep = end + 10; // Isha runs late — sleep moves, prayer doesn't
      place({
        title: name,
        cat: "prayer",
        start: tt - pre,
        end,
        note: name === "Jumu'ah" ? "Leave early — arrive before the khutbah" : "10 min wudu buffer before adhan"
      });
    }
  }

  /* 2 — fixed commitments, split around prayers if they collide */
  const prayerBlocks = blocks.filter(b => b.cat === "prayer");
  for (const f of fixed) {
    let segs = [[f.start <= wake && f.end <= wake ? f.start + 1440 : f.start, f.end <= f.start ? f.end + 1440 : f.end]];
    for (const p of prayerBlocks) {
      segs = segs.flatMap(([s, e]) => {
        if (s < p.end && e > p.start) {
          const out = [];
          if (p.start - s >= 10) out.push([s, p.start]);
          if (e - p.end >= 10) out.push([p.end, e]);
          return out;
        }
        return [[s, e]];
      });
    }
    segs.forEach(([s, e], i) => {
      place({
        title: f.title,
        cat: "fixed",
        start: s,
        end: e,
        note: segs.length > 1 ? i === 0 ? "Step away to pray, then resume" : "Resumes after prayer" : f.note || ""
      }, 0);
    });
  }

  /* helper anchors */
  const pB = name => blocks.find(b => b.cat === "prayer" && b.title === name);
  const fajrEnd = pB("Fajr")?.end ?? wake;
  const dhuhrB = pB("Dhuhr") || pB("Jumu'ah"),
    asrB = pB("Asr"),
    maghribB = pB("Maghrib"),
    ishaB = pB("Isha");

  /* 3 — meals (fasting-aware, anchored to prayers, never rushed) */
  const meals = [];
  const dinnerCap = sleep - 150; // keep dinner >=2.5h before sleep
  if (fasting) {
    if (P.fajr != null && wake <= P.fajr - 25) {
      const s = Math.max(wake, P.fajr - 55);
      place({
        title: "Suhoor",
        cat: "meal",
        start: s,
        end: P.fajr - 15,
        note: "Eat well + hydrate — ends before Fajr"
      });
      meals.push([s, P.fajr - 15]);
    }
    if (maghribB) {
      place({
        title: "Iftar",
        cat: "meal",
        start: maghribB.end,
        end: maghribB.end + 40,
        note: "Break with dates + water at adhan, pray, then eat"
      });
      meals.push([maghribB.end, maghribB.end + 40]);
    }
  } else {
    const mealSlots = [];
    if (mealsCount >= 3) mealSlots.push({
      title: "Breakfast",
      dur: 25,
      win: [fajrEnd, fajrEnd + 150],
      note: "Whole foods + water first"
    });
    if (dhuhrB) mealSlots.push({
      title: "Lunch",
      dur: 35,
      win: [dhuhrB.end, dhuhrB.end + 100],
      alt: [dhuhrB.start - 120, dhuhrB.start],
      note: "Unhurried — after the midday prayer"
    });else mealSlots.push({
      title: "Lunch",
      dur: 35,
      win: [wake + 300, wake + 420],
      note: ""
    });
    if (maghribB) mealSlots.push({
      title: "Dinner",
      dur: 40,
      win: [maghribB.end, Math.min(maghribB.end + 110, dinnerCap)],
      alt: [asrB ? asrB.end : maghribB.start - 150, maghribB.start],
      note: "Light + early enough to protect sleep"
    });else mealSlots.push({
      title: "Dinner",
      dur: 40,
      win: [sleep - 300, dinnerCap],
      note: ""
    });
    for (const m of mealSlots) {
      let s = fit(m.dur, m.win[0], m.win[1]);
      let note = m.note;
      if (s == null && m.alt) {
        s = fit(m.dur, m.alt[0], m.alt[1]);
        if (s != null) note = "Moved earlier to fit the day";
      }
      if (s != null) {
        place({
          title: m.title,
          cat: "meal",
          start: s,
          end: s + m.dur,
          note
        });
        meals.push([s, s + m.dur]);
      }
    }
  }

  /* 3.5 — Qur'an & dhikr */
  if (includeQuran !== false) {
    let qs = fit(15, fajrEnd + 5, fajrEnd + 120);
    if (qs == null && maghribB) qs = fit(15, maghribB.end + 5, maghribB.end + 90);
    if (qs != null) place({
      title: "Qur'an & dhikr",
      cat: "rest",
      start: qs,
      end: qs + 15,
      note: "Daily connection — even one page counts"
    });
  }

  /* 4 — workout, spaced from meals and ending clear of prayer */
  if (workout.type && workout.type !== "none") {
    const dur = workout.duration || 60;
    const noMealBefore = s => !meals.some(([ms, me]) => s - me < 60 && s - me > -dur);
    let win;
    if (workout.pref === "morning") win = [wake + 45, dhuhrB ? dhuhrB.start - 15 : wake + 300];else if (workout.pref === "evening") win = [maghribB ? maghribB.end : sleep - 240, sleep - 120];else win = [asrB ? asrB.end : wake + 480, maghribB ? maghribB.start - 15 : sleep - 150];
    let s = fit(dur, win[0], win[1], noMealBefore);
    if (s == null) s = fit(dur, wake + 45, sleep - 120, noMealBefore);
    if (s != null) place({
      title: workout.type[0].toUpperCase() + workout.type.slice(1),
      cat: "fitness",
      start: s,
      end: s + dur,
      note: "Hydrate before + cooldown after (buffer added)"
    });
  }

  /* 5 — deep work in the highest-energy windows */
  const taskList = tasks.filter(Boolean);
  const deepLen = energy === "high" ? 90 : energy === "low" ? 45 : 60;
  const deepCount = Math.min(taskList.length, energy === "low" ? 2 : 3);
  const morningStart = energy === "low" ? wake + 100 : fajrEnd + 15;
  const windows = [[morningStart, dhuhrB ? dhuhrB.start - 10 : wake + 300], [dhuhrB ? dhuhrB.end + 40 : wake + 320, asrB ? asrB.start - 10 : wake + 540], [asrB ? asrB.end : wake + 560, maghribB ? maghribB.start - 10 : sleep - 180]];
  if (energy === "low") windows.push(windows.shift()); // low energy: start after food/light, not first thing
  let di = 0;
  const notEatingSleep = (s, e) => e <= sleep - 75;
  for (let i = 0; i < deepCount; i++) {
    let placed = false;
    for (const [ws, we] of windows) {
      const s = fit(deepLen, ws, we, notEatingSleep);
      if (s != null) {
        place({
          title: `Deep work — ${taskList[di]}`,
          cat: "deep",
          start: s,
          end: s + deepLen,
          note: i === 0 ? "Highest-energy window — protect it" : "Water + 2 min stretch after"
        });
        di++;
        placed = true;
        break;
      }
    }
    if (!placed) break;
  }

  /* 6 — wind-down + sleep protection */
  const wdStart = fit(45, sleep - 90, sleep, null, true);
  if (wdStart != null) place({
    title: "Wind-down",
    cat: "rest",
    start: wdStart,
    end: wdStart + 45,
    note: "Screens off, dim lights, tomorrow's plan out"
  });
  place({
    title: "Sleep",
    cat: "sleep",
    start: sleep,
    end: sleep + 30,
    note: ""
  }, 0);

  /* 7 — remaining tasks as lighter blocks, then one daylight break */
  for (; di < taskList.length; di++) {
    const s = fit(30, wake + 60, sleep - 90, notEatingSleep);
    if (s == null) break;
    place({
      title: taskList[di],
      cat: "task",
      start: s,
      end: s + 30,
      note: ""
    });
  }
  const brk = fit(15, P.dhuhr ?? wake + 360, (P.maghrib ?? sleep) - 30);
  if (brk != null) place({
    title: "Outside break",
    cat: "rest",
    start: brk,
    end: brk + 15,
    note: "Natural light + short walk + water"
  });
  blocks.sort((a, b) => a.start - b.start || a.end - b.end);
  return {
    blocks,
    dayEnd: sleep + 30
  };
}

  if (typeof s !== "string") return null;
  const m = s.match(/(\d{1,2}):(\d{2})/);
  if (!m) return null;
  let t = Number(m[1]) * 60 + Number(m[2]);
  if (t < wake - 180) t += 1440;
  return t;
}

async function aiExtract({
  groqKey,
  geminiKey,
  text,
  imageDataUrl,
  dateKey
}) {
  const instr = `You extract planning data. From the provided ${imageDataUrl ? "image (and any text)" : "text"}, extract items relevant to scheduling around ${dateKey}.
Return ONLY JSON, no prose: {"commitments":[{"title":string,"start":"HH:MM","end":"HH:MM"}],"tasks":[{"title":string,"due":"YYYY-MM-DD" or null}]}
Rules: commitments are things with a fixed clock time (classes, meetings, appointments, shifts) in 24h time; if an end time is missing, estimate a sensible one. tasks are to-dos without a fixed time; extract a due date only if one is clearly stated or implied. Keep titles short. Ignore decoration, headers, and anything that is not actionable.`;
  const parseJson = t => {
    const s = String(t);
    const a = s.indexOf("{"),
      b = s.lastIndexOf("}");
    if (a === -1 || b === -1) throw new Error("no JSON in reply");
    const p = JSON.parse(s.slice(a, b + 1));
    const hhmm = /^\d{1,2}:\d{2}$/;
    return {
      commitments: (Array.isArray(p.commitments) ? p.commitments : []).filter(c => c && c.title && hhmm.test(String(c.start || ""))).map(c => ({
        title: String(c.title).slice(0, 60),
        start: String(c.start).padStart(5, "0"),
        end: hhmm.test(String(c.end || "")) ? String(c.end).padStart(5, "0") : null
      })).slice(0, 12),
      tasks: (Array.isArray(p.tasks) ? p.tasks : []).filter(t2 => t2 && t2.title).map(t2 => ({
        title: String(t2.title).slice(0, 80),
        due: /^\d{4}-\d{2}-\d{2}$/.test(String(t2.due || "")) ? t2.due : null
      })).slice(0, 20)
    };
  };
  if (imageDataUrl) {
    if (!geminiKey) throw new Error("NO_GEMINI");
    const b64 = imageDataUrl.split(",")[1];
    const mime = (imageDataUrl.match(/^data:([^;]+)/) || [])[1] || "image/jpeg";
    let lastErr = null;

          method: "POST",

            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            contents: [{
              parts: [{
                text: instr + (text ? "\n\nAdditional text from the user:\n" + text : "")
              }, {
                inline_data: {
                  mime_type: mime,
                  data: b64
                }
              }]
            }]
          })
        });
        if (!r.ok) throw new Error("Gemini " + r.status);
        const d = await r.json();
        const out = d.candidates && d.candidates[0] && d.candidates[0].content && d.candidates[0].content.parts ? d.candidates[0].content.parts.map(p => p.text || "").join("") : "";
        return parseJson(out);
      } catch (e) {
        lastErr = e;
      }
    }
    throw lastErr || new Error("photo extraction failed");
  }
  // text-only: Groq cascade
  let lastErr = null;
  for (const model of ["openai/gpt-oss-120b", "llama-3.3-70b-versatile", "llama-3.1-8b-instant"]) {
    try {
      const body = {
        model,
        temperature: 0.2,
        max_tokens: 2000,
        response_format: {
          type: "json_object"
        },
        messages: [{
          role: "system",
          content: "You output only strict JSON."
        }, {
          role: "user",
          content: instr + "\n\nTEXT:\n" + text
        }]
      };
      if (model.includes("gpt-oss")) body.reasoning_effort = "low";
      const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${groqKey}`
        },
        body: JSON.stringify(body)
      });
      if (!r.ok) throw new Error("Groq " + r.status);
      const d = await r.json();
      return parseJson(d.choices[0].message.content);
    } catch (e) {
      lastErr = e;
    }
  }
  throw lastErr || new Error("extraction failed");
}
function downscaleImage(file) {
  return new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = () => {
      const img = new Image();
      img.onload = () => {
        const max = 1280;
        const sc = Math.min(1, max / Math.max(img.width, img.height));
        const cv = document.createElement("canvas");
        cv.width = Math.round(img.width * sc);
        cv.height = Math.round(img.height * sc);
        cv.getContext("2d").drawImage(img, 0, 0, cv.width, cv.height);
        resolve(cv.toDataURL("image/jpeg", 0.85));
      };
      img.onerror = reject;
      img.src = fr.result;
    };
    fr.onerror = reject;
    fr.readAsDataURL(file);
  });
}
