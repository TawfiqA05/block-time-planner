/* ---------- time helpers (minutes since midnight of plan day) ---------- */
const pad = (n) => String(n).padStart(2, "0");
const fmt = (min) => {
  const m = ((Math.round(min) % 1440) + 1440) % 1440;
  let h = Math.floor(m / 60), mm = m % 60;
  const ap = h >= 12 ? "PM" : "AM";
  h = h % 12 === 0 ? 12 : h % 12;
  return `${h}:${pad(mm)} ${ap}`;
};
const toInputVal = (min) => {
  const m = ((Math.round(min) % 1440) + 1440) % 1440;
  return `${pad(Math.floor(m / 60))}:${pad(m % 60)}`;
};
const fromInputVal = (s) => {
  if (!s) return null;
  const [h, m] = s.split(":").map(Number);
  return h * 60 + m;
};

/* ---------- prayer time calculation (solar, no network) ---------- */
const METHODS = {
  ISNA: { fajr: 15, isha: 15, label: "ISNA (15° / 15°)" },
  MWL: { fajr: 18, isha: 17, label: "Muslim World League (18° / 17°)" },
};
function computePrayerTimes(dateObj, lat, lng, methodKey, asrFactor) {
  const rad = Math.PI / 180;
  const method = METHODS[methodKey] || METHODS.ISNA;
  const tz = -new Date(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate(), 12).getTimezoneOffset() / 60;

  const y = dateObj.getFullYear(), mo = dateObj.getMonth() + 1, d = dateObj.getDate();
  const a = Math.floor((14 - mo) / 12), yy = y + 4800 - a, mm = mo + 12 * a - 3;
  const jdn =
    d + Math.floor((153 * mm + 2) / 5) + 365 * yy + Math.floor(yy / 4) -
    Math.floor(yy / 100) + Math.floor(yy / 400) - 32045;
  const D = jdn - 2451545.0;

  const g = ((357.529 + 0.98560028 * D) % 360 + 360) % 360;
  const q = ((280.459 + 0.98564736 * D) % 360 + 360) % 360;
  const L = ((q + 1.915 * Math.sin(g * rad) + 0.02 * Math.sin(2 * g * rad)) % 360 + 360) % 360;
  const e = 23.439 - 0.00000036 * D;
  let RA = Math.atan2(Math.cos(e * rad) * Math.sin(L * rad), Math.cos(L * rad)) / rad / 15;
  RA = ((RA % 24) + 24) % 24;
  const decl = Math.asin(Math.sin(e * rad) * Math.sin(L * rad)) / rad;
  let eqt = q / 15 - RA;
  eqt = eqt - 24 * Math.round(eqt / 24);

  const dhuhr = 12 + tz - lng / 15 - eqt;
  const hourAngle = (angle) => {
    const cosH =
      (-Math.sin(angle * rad) - Math.sin(lat * rad) * Math.sin(decl * rad)) /
      (Math.cos(lat * rad) * Math.cos(decl * rad));
    if (cosH < -1 || cosH > 1) return null;
    return Math.acos(cosH) / rad / 15;
  };
  const asrAngle = -Math.atan(1 / (asrFactor + Math.tan(Math.abs(lat - decl) * rad))) / rad;
  const tF = hourAngle(method.fajr), tR = hourAngle(0.833), tI = hourAngle(method.isha);
  const tA = hourAngle(asrAngle);
  const toMin = (h) => (h == null ? null : Math.round(((h % 24) + 24) % 24 * 60));
  return {
    fajr: toMin(tF != null ? dhuhr - tF : dhuhr - 1.5),
    sunrise: toMin(tR != null ? dhuhr - tR : dhuhr - 1),
    dhuhr: toMin(dhuhr + 2 / 60),
    asr: toMin(tA != null ? dhuhr + tA : dhuhr + 4),
    maghrib: toMin(tR != null ? dhuhr + tR : dhuhr + 1),
    isha: toMin(tI != null ? dhuhr + tI : dhuhr + 1.5),
  };
}

/* ---------- persistent storage ---------- */
async function sGet(key) {
  const client = getClient();
  if (client) {
    try {
      const { data: { user } } = await client.auth.getUser();
      if (user) {
        const { data, error } = await client.from("kv").select("value").eq("user_id", user.id).eq("key", key).maybeSingle();
        if (!error) {
          if (data) { try { localStorage.setItem(key, JSON.stringify(data.value)); } catch {} return data.value; }
          return null;
        }
      }
    } catch (e) { console.error("cloud read failed — using this device's copy", e); }
  }
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; }
}
async function sSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
  const client = getClient();
  if (client) {
    try {
      const { data: { user } } = await client.auth.getUser();
      if (user) {
        const { error } = await client.from("kv").upsert({ user_id: user.id, key, value: val, updated_at: new Date().toISOString() });
        if (error) console.error("cloud save failed (saved on this device)", error.message);
      }
    } catch (e) { console.error("cloud save failed (saved on this device)", e); }
  }
}

/* ---------- the scheduler ---------- */
function buildSchedule(cfg) {
  const { wake, prayers, fixed, tasks, energy, workout, mealsCount } = cfg;
  let sleep = cfg.sleep <= wake ? cfg.sleep + 1440 : cfg.sleep;
  const blocks = [];
  const occ = []; // padded occupied intervals

  const overlaps = (s, e) => occ.some((o) => s < o.e && e > o.s);
  const inDay = (s, e) => s >= wake && e <= sleep;
  const fit = (dur, winS, winE, validate, backward = false) => {
    winS = Math.max(winS, wake);
    winE = Math.min(winE, sleep);
    if (winE - winS < dur) return null;
    const starts = [];
    for (let t = winS; t + dur <= winE; t += 5) starts.push(t);
    if (backward) starts.reverse();
    for (const t of starts) {
      if (!overlaps(t - 5, t + dur + 5) && (!validate || validate(t, t + dur))) return t;
    }
    // relax padding if nothing fit
    for (const t of starts) {
      if (!overlaps(t, t + dur) && (!validate || validate(t, t + dur))) return t;
    }
    return null;
  };
  const place = (b, pad = 5) => {
    blocks.push({ id: uid(), ...b });
    occ.push({ s: b.start - (b.cat === "prayer" ? 0 : pad), e: b.end + pad });
  };

  /* 1 — prayers: unhurried anchors with wudu buffer built in */
  const P = prayers;
  // Fajr
  if (P.fajr != null) {
    if (wake <= P.fajr) {
      place({ title: "Fajr", cat: "prayer", start: Math.max(wake, P.fajr - 10), end: P.fajr + 25, note: "Wudu buffer built in — no rush" });
    } else if (wake < P.sunrise) {
      place({ title: "Fajr", cat: "prayer", start: wake, end: wake + 25, note: `Pray on waking — sunrise at ${fmt(P.sunrise)}` });
    }
  }
  for (const [name, t] of [["Dhuhr", P.dhuhr], ["Asr", P.asr], ["Maghrib", P.maghrib], ["Isha", P.isha]]) {
    if (t == null) continue;
    let tt = t < wake ? t + 1440 : t;
    if (tt >= wake && tt <= sleep + 30) {
      const end = tt + 25;
      if (end > sleep) sleep = end + 10; // Isha runs late — sleep moves, prayer doesn't
      place({ title: name, cat: "prayer", start: tt - 10, end, note: "10 min wudu buffer before adhan" });
    }
  }

  /* 2 — fixed commitments, split around prayers if they collide */
  const prayerBlocks = blocks.filter((b) => b.cat === "prayer");
  for (const f of fixed) {
    let segs = [[f.start <= wake && f.end <= wake ? f.start + 1440 : f.start, f.end <= f.start ? f.end + 1440 : f.end]];
    for (const p of prayerBlocks) {
      segs = segs.flatMap(([s, e]) => {
        if (s < p.end && e > p.start) {
          const out = [];
          if (p.start - s >= 10) out.push([s, p.start]);
          if (e - p.end >= 10) out.push([p.end, e]);
          return out;
        }
        return [[s, e]];
      });
    }
    segs.forEach(([s, e], i) => {
      place(
        { title: f.title, cat: "fixed", start: s, end: e, note: segs.length > 1 ? (i === 0 ? "Step away to pray, then resume" : "Resumes after prayer") : f.note || "" },
        0
      );
    });
  }

  /* helper anchors */
  const pB = (name) => blocks.find((b) => b.cat === "prayer" && b.title === name);
  const fajrEnd = pB("Fajr")?.end ?? wake;
  const dhuhrB = pB("Dhuhr"), asrB = pB("Asr"), maghribB = pB("Maghrib"), ishaB = pB("Isha");

  /* 3 — meals (anchored to prayers, never rushed) */
  const mealSlots = [];
  if (mealsCount >= 3) mealSlots.push({ title: "Breakfast", dur: 25, win: [fajrEnd, fajrEnd + 150], note: "Whole foods + water first" });
  if (dhuhrB) mealSlots.push({ title: "Lunch", dur: 35, win: [dhuhrB.end, dhuhrB.end + 100], alt: [dhuhrB.start - 120, dhuhrB.start], note: "Unhurried — after Dhuhr" });
  else mealSlots.push({ title: "Lunch", dur: 35, win: [wake + 300, wake + 420], note: "" });
  const dinnerCap = sleep - 150; // keep dinner ≥2.5h before sleep
  if (maghribB) mealSlots.push({ title: "Dinner", dur: 40, win: [maghribB.end, Math.min(maghribB.end + 110, dinnerCap)], alt: [asrB ? asrB.end : maghribB.start - 150, maghribB.start], note: "Light + early enough to protect sleep" });
  else mealSlots.push({ title: "Dinner", dur: 40, win: [sleep - 300, dinnerCap], note: "" });
  const meals = [];
  for (const m of mealSlots) {
    let s = fit(m.dur, m.win[0], m.win[1]);
    let note = m.note;
    if (s == null && m.alt) { s = fit(m.dur, m.alt[0], m.alt[1]); if (s != null) note = "Moved earlier to fit the day"; }
    if (s != null) { place({ title: m.title, cat: "meal", start: s, end: s + m.dur, note }); meals.push([s, s + m.dur]); }
  }

  /* 4 — workout, spaced from meals and ending clear of prayer */
  if (workout.type && workout.type !== "none") {
    const dur = workout.duration || 60;
    const noMealBefore = (s) => !meals.some(([ms, me]) => s - me < 60 && s - me > -dur);
    let win;
    if (workout.pref === "morning") win = [wake + 45, dhuhrB ? dhuhrB.start - 15 : wake + 300];
    else if (workout.pref === "evening") win = [maghribB ? maghribB.end : sleep - 240, sleep - 120];
    else win = [asrB ? asrB.end : wake + 480, maghribB ? maghribB.start - 15 : sleep - 150];
    let s = fit(dur, win[0], win[1], noMealBefore);
    if (s == null) s = fit(dur, wake + 45, sleep - 120, noMealBefore);
    if (s != null)
      place({ title: workout.type[0].toUpperCase() + workout.type.slice(1), cat: "fitness", start: s, end: s + dur, note: "Hydrate before + cooldown after (buffer added)" });
  }

  /* 5 — deep work in the highest-energy windows */
  const taskList = tasks.filter(Boolean);
  const deepLen = energy === "high" ? 90 : energy === "low" ? 45 : 60;
  const deepCount = Math.min(taskList.length, energy === "low" ? 2 : 3);
  const morningStart = energy === "low" ? wake + 100 : fajrEnd + 15;
  const windows = [
    [morningStart, dhuhrB ? dhuhrB.start - 10 : wake + 300],
    [dhuhrB ? dhuhrB.end + 40 : wake + 320, asrB ? asrB.start - 10 : wake + 540],
    [asrB ? asrB.end : wake + 560, maghribB ? maghribB.start - 10 : sleep - 180],
  ];
  if (energy === "low") windows.push(windows.shift()); // low energy: start after food/light, not first thing
  let di = 0;
  const notEatingSleep = (s, e) => e <= sleep - 75;
  for (let i = 0; i < deepCount; i++) {
    let placed = false;
    for (const [ws, we] of windows) {
      const s = fit(deepLen, ws, we, notEatingSleep);
      if (s != null) {
        place({ title: `Deep work — ${taskList[di]}`, cat: "deep", start: s, end: s + deepLen, note: i === 0 ? "Highest-energy window — protect it" : "Water + 2 min stretch after" });
        di++; placed = true; break;
      }
    }
    if (!placed) break;
  }

  /* 6 — wind-down + sleep protection */
  const wdStart = fit(45, sleep - 90, sleep, null, true);
  if (wdStart != null)
    place({ title: "Wind-down", cat: "rest", start: wdStart, end: wdStart + 45, note: "Screens off, dim lights, tomorrow's plan out" });
  place({ title: "Sleep", cat: "sleep", start: sleep, end: sleep + 30, note: "" }, 0);

  /* 7 — remaining tasks as lighter blocks, then one daylight break */
  for (; di < taskList.length; di++) {
    const s = fit(30, wake + 60, sleep - 90, notEatingSleep);
    if (s == null) break;
    place({ title: taskList[di], cat: "task", start: s, end: s + 30, note: "" });
  }
  const brk = fit(15, (P.dhuhr ?? wake + 360), (P.maghrib ?? sleep) - 30);
  if (brk != null)
    place({ title: "Outside break", cat: "rest", start: brk, end: brk + 15, note: "Natural light + short walk + water" });

  blocks.sort((a, b) => a.start - b.start || a.end - b.end);
  return { blocks, dayEnd: sleep + 30 };
}

    @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Karla:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap');
    :root{ --bg:#12141C; --surface:#1B1F2B; --surface2:#232838; --line:#2C3245; --ink:#ECE9E1; --muted:#8A8FA3; --amber:#E3A857; }
    *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
    .btp{min-height:100vh;background:var(--bg);color:var(--ink);font-family:'Karla',system-ui,sans-serif;font-size:15px;line-height:1.45}
    .wrap{max-width:520px;margin:0 auto;padding:20px 16px 90px}
    .brand{font-family:'Instrument Serif',serif;font-size:26px;letter-spacing:.2px}
    .brand em{color:var(--amber);font-style:normal}
    .eyebrow{font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
    h2{font-family:'Instrument Serif',serif;font-weight:400;font-size:24px;margin:6px 0 2px}
    .sub{color:var(--muted);font-size:13.5px;margin-bottom:18px}
    .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
    label.fld{display:block;font-size:12.5px;color:var(--muted);margin-bottom:5px;font-weight:600}
    input[type=text],input[type=time],input[type=number],input[type=date],textarea,select{
      width:100%;background:var(--surface2);border:1px solid var(--line);border-radius:10px;color:var(--ink);
      padding:10px 12px;font-family:'Karla',sans-serif;font-size:15px;outline:none}
    input:focus,textarea:focus,select:focus{border-color:var(--amber)}
    input[type=time],input[type=number]{font-family:'Spline Sans Mono',monospace;font-size:14px}
    textarea{min-height:96px;resize:vertical}
    .chiprow{display:flex;flex-wrap:wrap;gap:8px}
    .chip{background:var(--surface2);border:1px solid var(--line);color:var(--ink);border-radius:999px;padding:7px 14px;font-size:13.5px;cursor:pointer;font-weight:600}
    .chip.on{background:rgba(227,168,87,.16);border-color:var(--amber);color:var(--amber)}
    .btn{display:block;width:100%;background:var(--amber);color:#1a1408;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;font-family:'Karla',sans-serif;cursor:pointer}
    .btn:active{transform:scale(.99)}
    .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line);font-weight:600}
    .btn:focus-visible,.chip:focus-visible,.blk:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
    .row{display:flex;gap:8px;align-items:center}
    .grow{flex:1}
    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
    .icnbtn{background:var(--surface);border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:7px 11px;font-size:13px;cursor:pointer;font-weight:600}
    .ptimes{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 4px}
    .ptag{font-family:'Spline Sans Mono',monospace;font-size:11.5px;background:rgba(227,168,87,.1);border:1px solid rgba(227,168,87,.3);color:var(--amber);border-radius:8px;padding:4px 8px}
    /* timeline */
    .tl{position:relative;margin-left:64px;border-left:6px solid transparent;padding-left:14px}
    .rail{position:absolute;left:-6px;top:0;width:6px;border-radius:3px}
    .hourline{position:absolute;left:0;right:0;border-top:1px solid rgba(44,50,69,.55)}
    .hourlbl{position:absolute;left:-72px;width:56px;text-align:right;font-family:'Spline Sans Mono',monospace;font-size:10.5px;color:var(--muted);transform:translateY(-6px)}
    .blk{position:absolute;left:10px;right:0;background:var(--surface);border:1px solid var(--line);border-left:4px solid;border-radius:10px;padding:6px 10px;overflow:hidden;cursor:pointer;text-align:left;font-family:'Karla',sans-serif;color:var(--ink)}
    .blk .t{font-weight:700;font-size:13.5px;line-height:1.25}
    .blk .tm{font-family:'Spline Sans Mono',monospace;font-size:10.5px;color:var(--muted)}
    .blk .nt{font-size:11.5px;color:var(--muted);line-height:1.3;margin-top:1px}
    .anchor{position:absolute;left:-24px;width:10px;height:10px;background:var(--amber);transform:rotate(45deg) translateY(-4px);border-radius:2px;box-shadow:0 0 8px rgba(227,168,87,.5)}
    .sheet{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-top:1px solid var(--line);border-radius:18px 18px 0 0;padding:18px 16px 26px;max-width:520px;margin:0 auto;z-index:50;box-shadow:0 -12px 40px rgba(0,0,0,.5)}
    .scrim{position:fixed;inset:0;background:rgba(6,8,14,.6);z-index:40}
    .pin{background:rgba(227,168,87,.1);border:1px solid rgba(227,168,87,.35);border-radius:12px;padding:10px 12px;font-size:13.5px;margin-bottom:12px}
    .pin b{color:var(--amber)}
    .fab{position:fixed;bottom:18px;right:16px;z-index:30;background:var(--amber);color:#1a1408;border:none;border-radius:999px;width:52px;height:52px;font-size:26px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.45)}
    .barbtns{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent, var(--bg) 40%);padding:24px 16px 16px;max-width:520px;margin:0 auto}
    .del{background:rgba(224,110,110,.12);border:1px solid rgba(224,110,110,.4);color:#e08a7a}
    .flash{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--amber);color:var(--amber);padding:8px 16px;border-radius:999px;font-size:13px;z-index:60}
    .reclist .row{padding:8px 0;border-bottom:1px solid var(--line)}
    .reclist .row:last-child{border-bottom:none}
    .mini{font-family:'Spline Sans Mono',monospace;font-size:12px;color:var(--muted)}
    a{color:var(--amber)}
    @media (prefers-reduced-motion: reduce){ *{transition:none!important;animation:none!important} }
  `;

  /* ---------- shared header ---------- */
  const Header = ({ back, onBack }) => (
    <div className="topbar">
      {back ? (
        <button className="icnbtn" onClick={onBack}>← Back</button>
      ) : (
        <div className="brand">block<em>·</em>time</div>
      )}
      {step !== "settings" && (
        <button className="icnbtn" onClick={() => { setReturnTo(step); setStep("settings"); }}>Settings</button>
      )}
    </div>
  );

  if (step === "loading")
    return (<div className="btp"><style>{css}</style><div className="wrap" style={{ paddingTop: 80, textAlign: "center", color: "#8A8FA3" }}>Opening your planner…</div></div>);

  if (step === "connect")
    return <ConnectView css={css} onDone={(cfg) => { localStorage.setItem("btp:config", JSON.stringify(cfg)); window.location.reload(); }} />;

  if (step === "auth")
    return <AuthView css={css} onSignedIn={loadData} />;

  /* ============ SETUP (first run) ============ */
  if (step === "setup" || step === "settings") {
    return (
      <SettingsView
        css={css}
        firstRun={step === "setup"}
        accountEmail={session?.user?.email}
        onSignOut={signOut}
        onExport={exportData}
        settings={settings}
        recurring={recurring}
        onDone={async (s, r) => {
          setSettings(s); setRecurring(r);
          await sSet("btp:settings", s); await sSet("btp:recurring", r);
          setStep(step === "setup" ? "input" : returnTo);
        }}
      />
    );
  }

  /* ============ STEP 1 — INPUT ============ */
  if (step === "input") {
    const dateChip = (d, lbl) => (
      <button key={lbl} className={`chip ${planDate.toDateString() === d.toDateString() ? "on" : ""}`} onClick={() => setPlanDate(d)}>{lbl}</button>
    );
    const today = new Date();
    return (
      <div className="btp"><style>{css}</style>
        <div className="wrap">
          <Header />
          <div className="eyebrow">Step 1 of 3</div>
          <h2>What does {planDate.toDateString() === today.toDateString() ? "today" : "tomorrow"} hold?</h2>
          <div className="sub">{planDate.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" })} · {settings.city.name}</div>

          {savedPlan && (
            <div className="pin" style={{ cursor: "pointer" }} onClick={() => { setPlan(savedPlan); setStep("schedule"); }}>
              <b>Saved plan</b> from {savedPlan.dateKey} — tap to open
            </div>
          )}

          <div className="card">
            <label className="fld">Planning for</label>
            <div className="chiprow">{dateChip(today, "Today")}{dateChip(tomorrow, "Tomorrow")}</div>
          </div>

          {todaysRec.length > 0 && (
            <div className="card reclist">
              <label className="fld">Your usual {DAYS[weekday]} commitments — uncheck anything that's off</label>
              {todaysRec.map((c) => (
                <div className="row" key={c.id}>
                  <input type="checkbox" checked={includedRec[c.id] !== false}
                    onChange={(e) => setIncludedRec({ ...includedRec, [c.id]: e.target.checked })} style={{ width: 18, height: 18 }} />
                  <div className="grow">{c.title}</div>
                  <div className="mini">{fmt(fromInputVal(c.start))}–{fmt(fromInputVal(c.end))}</div>
                </div>
              ))}
            </div>
          )}

          <div className="card">
            <label className="fld">One-off fixed commitments (meetings, appointments, shifts)</label>
            {oneOffs.map((o, i) => (
              <div className="row" key={i} style={{ marginBottom: 8 }}>
                <input type="text" placeholder="What" value={o.title} className="grow"
                  onChange={(e) => setOneOffs(oneOffs.map((x, j) => j === i ? { ...x, title: e.target.value } : x))} />
                <input type="time" value={o.start} style={{ width: 96 }}
                  onChange={(e) => setOneOffs(oneOffs.map((x, j) => j === i ? { ...x, start: e.target.value } : x))} />
                <input type="time" value={o.end} style={{ width: 96 }}
                  onChange={(e) => setOneOffs(oneOffs.map((x, j) => j === i ? { ...x, end: e.target.value } : x))} />
              </div>
            ))}
            <button className="chip" onClick={() => setOneOffs([...oneOffs, { title: "", start: "", end: "" }])}>+ Add commitment</button>
          </div>

          <div className="card">
            <label className="fld">Everything else you want done — one per line</label>
            <textarea placeholder={"Finish ML homework\nEmail Carlos about M-301\nReview scRNA-seq notes"} value={taskText} onChange={(e) => setTaskText(e.target.value)} />
          </div>

          <button className="btn" onClick={() => setStep("questions")}>Next — a few quick questions</button>
        </div>
      </div>
    );
  }

  /* ============ STEP 2 — QUESTIONS ============ */
  if (step === "questions") {
    const set = (k, v) => setQ({ ...q, [k]: v });
    const chip = (k, v, lbl) => (
      <button key={v} className={`chip ${q[k] === v ? "on" : ""}`} onClick={() => set(k, v)}>{lbl || v}</button>
    );
    return (
      <div className="btp"><style>{css}</style>
        <div className="wrap">
          <Header back onBack={() => setStep("input")} />
          <div className="eyebrow">Step 2 of 3</div>
          <h2>Six quick questions</h2>
          <div className="sub">Prayer times for {settings.city.name} are already calculated — the day gets built around them.</div>
          {prayers && (
            <div className="ptimes">
              {[["Fajr", prayers.fajr], ["Dhuhr", prayers.dhuhr], ["Asr", prayers.asr], ["Maghrib", prayers.maghrib], ["Isha", prayers.isha]].map(([n, t]) => (
                <span className="ptag" key={n}>{n} {fmt(t)}</span>
              ))}
            </div>
          )}

          <div className="card">
            <label className="fld">1 · Waking up and lights out</label>
            <div className="row">
              <div className="grow"><label className="fld">Wake</label><input type="time" value={q.wake} onChange={(e) => set("wake", e.target.value)} /></div>
              <div className="grow"><label className="fld">Asleep by</label><input type="time" value={q.sleep} onChange={(e) => set("sleep", e.target.value)} /></div>
            </div>
            {prayers && fromInputVal(q.wake) > prayers.fajr && (
              <div className="mini" style={{ marginTop: 8, color: "#E3A857" }}>Fajr is {fmt(prayers.fajr)} — waking after adhan is fine, Fajr goes first on waking.</div>
            )}
          </div>

          <div className="card">
            <label className="fld">2 · How's your energy for this day?</label>
            <div className="chiprow">{chip("energy", "high", "High")}{chip("energy", "medium", "Medium")}{chip("energy", "low", "Low")}</div>
            <label className="fld" style={{ marginTop: 10 }}>Hours of sleep you'll have had</label>
            <input type="number" min="3" max="12" step="0.5" value={q.slept} onChange={(e) => set("slept", e.target.value)} style={{ width: 110 }} />
          </div>

          <div className="card">
            <label className="fld">3 · Any workout planned?</label>
            <div className="chiprow">
              {["none", "tennis", "pickleball", "gym", "run"].map((w) => chip("workoutType", w, w[0].toUpperCase() + w.slice(1)))}
            </div>
            {q.workoutType !== "none" && (
              <div className="row" style={{ marginTop: 10 }}>
                <div className="grow"><label className="fld">Minutes</label>
                  <input type="number" min="20" max="180" step="5" value={q.workoutDur} onChange={(e) => set("workoutDur", e.target.value)} /></div>
                <div className="grow"><label className="fld">Prefer</label>
                  <select value={q.workoutPref} onChange={(e) => set("workoutPref", e.target.value)}>
                    <option value="morning">Morning</option><option value="afternoon">Afternoon</option><option value="evening">Evening</option>
                  </select></div>
              </div>
            )}
          </div>

          <div className="card">
            <label className="fld">4 · Meals</label>
            <div className="chiprow">{[2, 3].map((n) => (
              <button key={n} className={`chip ${Number(q.meals) === n ? "on" : ""}`} onClick={() => set("meals", n)}>{n} meals</button>
            ))}</div>
            <div className="mini" style={{ marginTop: 8 }}>Spacing from workouts and sleep is handled automatically.</div>
          </div>

          <div className="card">
            <label className="fld">5 · Anything non-negotiable or hard-deadline?</label>
            <input type="text" placeholder="e.g. B429 assignment due 11:59 PM" value={q.hardline} onChange={(e) => set("hardline", e.target.value)} />
          </div>

          <div className="card">
            <label className="fld">6 · Confirm the anchors look right</label>
            <div className="mini">Prayers get a 10-min wudu buffer and are never squeezed. Deep work lands in your {q.energy === "low" ? "late-morning (after food + light)" : "morning"} window given {q.energy} energy.</div>
          </div>

          <button className="btn" onClick={generate}>Build my day</button>
        </div>
      </div>
    );
  }

  /* ============ STEP 3 — SCHEDULE ============ */
  if (step === "schedule" && plan) {
    return (
      <ScheduleView
        css={css}
        plan={plan}
        setPlan={setPlan}
        editing={editing}
        setEditing={setEditing}
        onSave={savePlan}
        savedFlash={savedFlash}
        onReplan={() => setStep("input")}
        Header={Header}
      />
    );
  }
  return null;
}

/* ============================================================
   SCHEDULE / TIMELINE VIEW
   ============================================================ */
function ScheduleView({ css, plan, setPlan, editing, setEditing, onSave, savedFlash, onReplan, Header }) {
  const [copied, setCopied] = useState(false);
  const PPM = 1.15; // px per minute
  const { blocks, dayStart, dayEnd, prayers, hardline } = plan;
  const H = (dayEnd - dayStart) * PPM;

  const pct = (t) => Math.max(0, Math.min(100, ((t - dayStart) / (dayEnd - dayStart)) * 100));
  const railBg = prayers
    ? `linear-gradient(180deg,#151a2e 0%,#151a2e ${pct(prayers.fajr)}%,#E3A857 ${pct(prayers.sunrise)}%,#8fa3c4 ${pct(prayers.sunrise) + 6}%,#8fa3c4 ${pct(prayers.maghrib) - 6}%,#E3A857 ${pct(prayers.maghrib)}%,#151a2e ${pct(prayers.isha)}%,#0e1120 100%)`
    : "#2C3245";

  const hours = [];
  for (let t = Math.ceil(dayStart / 60) * 60; t <= dayEnd; t += 60) hours.push(t);

  // lane offsets for overlapping blocks
  const laid = blocks.map((b) => ({ ...b }));
  laid.forEach((b, i) => {
    b.lane = 0;
    for (let j = 0; j < i; j++) if (laid[j].start < b.end && laid[j].end > b.start && laid[j].lane === b.lane) { b.lane++; j = -1; }
  });

  const update = (id, patch) => setPlan({ ...plan, blocks: blocks.map((b) => (b.id === id ? { ...b, ...patch } : b)).sort((a, b) => a.start - b.start) });
  const remove = (id) => { setPlan({ ...plan, blocks: blocks.filter((b) => b.id !== id) }); setEditing(null); };
  const addBlock = () => {
    const nb = { id: uid(), title: "New block", cat: "task", start: dayStart + 60, end: dayStart + 90, note: "" };
    setPlan({ ...plan, blocks: [...blocks, nb].sort((a, b) => a.start - b.start) });
    setEditing(nb.id);
  };

  const eb = blocks.find((b) => b.id === editing);

  return (
    <div className="btp"><style>{css}</style>
      <div className="wrap">
        <Header back onBack={onReplan} />
        <div className="eyebrow">Step 3 of 3 · Tap any block to adjust it</div>
        <h2>{new Date(plan.dateKey + "T12:00").toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" })}</h2>
        <div className="sub">{fmt(dayStart)} wake → {fmt(dayEnd - 30)} asleep · prayers anchored, buffers built in</div>

        {hardline && (<div className="pin"><b>Non-negotiable:</b> {hardline}</div>)}

        <div className="tl" style={{ height: H + 20 }}>
          <div className="rail" style={{ height: H, background: railBg }} />
          {hours.map((t) => (
            <React.Fragment key={t}>
              <div className="hourline" style={{ top: (t - dayStart) * PPM }} />
              {(t / 60) % 2 === 0 && <div className="hourlbl" style={{ top: (t - dayStart) * PPM }}>{fmt(t)}</div>}
            </React.Fragment>
          ))}
          {laid.map((b) => {
            const top = (b.start - dayStart) * PPM;
            const h = Math.max((b.end - b.start) * PPM, 30);
            return (
              <React.Fragment key={b.id}>
                {b.cat === "prayer" && <div className="anchor" style={{ top: top + 10 }} />}
                <button
                  className="blk"
                  style={{ top, height: h, borderLeftColor: CATS[b.cat].color, marginLeft: b.lane * 16, background: b.cat === "sleep" ? "transparent" : undefined, borderStyle: b.cat === "sleep" ? "dashed" : "solid" }}
                  onClick={() => setEditing(b.id)}
                >
                  <div className="t" style={{ color: b.cat === "prayer" ? CATS.prayer.color : undefined }}>{b.title}</div>
                  <div className="tm">{fmt(b.start)} – {fmt(b.end)} · {b.end - b.start}m</div>
                  {b.note && h > 52 && <div className="nt">{b.note}</div>}
                </button>
              </React.Fragment>
            );
          })}
        </div>

        <div className="barbtns">
          <div className="row">
            <button className="btn ghost grow" onClick={onReplan}>Replan</button>
            <button className="btn ghost grow" onClick={() => {
              const txt = `Plan — ${plan.dateKey}\n` + blocks.map((b) => `${fmt(b.start)}–${fmt(b.end)}  ${b.title}${b.note ? " — " + b.note : ""}`).join("\n");
              navigator.clipboard.writeText(txt).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1500); }).catch(() => {});
            }}>{copied ? "Copied ✓" : "Copy as text"}</button>
            <button className="btn grow" onClick={onSave}>Save plan</button>
          </div>
        </div>
        <button className="fab" onClick={addBlock} aria-label="Add block">+</button>
        {savedFlash && <div className="flash">Plan saved ✓</div>}
      </div>

      {eb && (
        <>
          <div className="scrim" onClick={() => setEditing(null)} />
          <div className="sheet">
            <label className="fld">Block</label>
            <input type="text" value={eb.title} onChange={(e) => update(eb.id, { title: e.target.value })} style={{ marginBottom: 10 }} />
            <div className="row" style={{ marginBottom: 10 }}>
              <div className="grow"><label className="fld">Start</label>
                <input type="time" value={toInputVal(eb.start)} onChange={(e) => { const v = fromInputVal(e.target.value); if (v != null) update(eb.id, { start: v < 240 ? v + 1440 : v, end: Math.max(eb.end, (v < 240 ? v + 1440 : v) + 15) }); }} /></div>
              <div className="grow"><label className="fld">End</label>
                <input type="time" value={toInputVal(eb.end)} onChange={(e) => { let v = fromInputVal(e.target.value); if (v != null) { if (v <= eb.start % 1440 && eb.start >= 1440) v += 1440; else if (v <= eb.start) v += 1440; update(eb.id, { end: v }); } }} /></div>
              <div className="grow"><label className="fld">Type</label>
                <select value={eb.cat} onChange={(e) => update(eb.id, { cat: e.target.value })}>
                  {Object.entries(CATS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                </select></div>
            </div>
            <div className="chiprow" style={{ marginBottom: 10 }}>
              <button className="chip" onClick={() => update(eb.id, { start: eb.start - 15, end: eb.end - 15 })}>◂ 15 min earlier</button>
              <button className="chip" onClick={() => update(eb.id, { start: eb.start + 15, end: eb.end + 15 })}>15 min later ▸</button>
              <button className="chip" onClick={() => update(eb.id, { end: eb.end + 15 })}>+15 longer</button>
              <button className="chip" onClick={() => eb.end - eb.start > 15 && update(eb.id, { end: eb.end - 15 })}>−15 shorter</button>
            </div>
            <label className="fld">Note</label>
            <input type="text" value={eb.note || ""} onChange={(e) => update(eb.id, { note: e.target.value })} style={{ marginBottom: 12 }} />
            <div className="row">
              <button className="btn ghost del grow" onClick={() => remove(eb.id)}>Delete</button>
              <button className="btn grow" onClick={() => setEditing(null)}>Done</button>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

/* ============================================================
   SETTINGS / FIRST-RUN SETUP
   ============================================================ */
function SettingsView({ css, firstRun, settings, recurring, onDone, accountEmail, onSignOut, onExport }) {
  const [city, setCity] = useState(settings?.city || null);
  const [custom, setCustom] = useState({ name: "", lat: "", lng: "" });
  const [method, setMethod] = useState(settings?.method || "ISNA");
  const [asrFactor, setAsrFactor] = useState(settings?.asrFactor || 1);
  const [wake, setWake] = useState(settings?.wake || "06:00");
  const [sleep, setSleep] = useState(settings?.sleep || "23:00");
  const [rec, setRec] = useState(recurring);
  const [nr, setNr] = useState({ title: "", days: [], start: "09:00", end: "10:00" });
  const [filter, setFilter] = useState("");

  const cityList = CITIES.filter((c) => c.name.toLowerCase().includes(filter.toLowerCase()));

  const addRec = () => {
    if (!nr.title || nr.days.length === 0) return;
    setRec([...rec, { ...nr, id: uid() }]);
    setNr({ title: "", days: [], start: "09:00", end: "10:00" });
  };

  const done = () => {
    let c = city;
    if (!c && custom.name && custom.lat && custom.lng) c = { name: custom.name, lat: Number(custom.lat), lng: Number(custom.lng) };
    if (!c) return;
    onDone({ city: c, method, asrFactor, wake, sleep }, rec);
  };

  return (
    <div className="btp"><style>{css}</style>
      <div className="wrap">
        <div className="topbar"><div className="brand">block<em>·</em>time</div></div>
        <div className="eyebrow">{firstRun ? "One-time setup" : "Settings"}</div>
        <h2>{firstRun ? "Set once, plan nightly" : "Your standing setup"}</h2>
        <div className="sub">City drives the five prayer times. Recurring commitments auto-fill each day's plan.</div>

        <div className="card">
          <label className="fld">Your city (for prayer times)</label>
          {city ? (
            <div className="row"><div className="grow">{city.name}</div><button className="chip" onClick={() => setCity(null)}>Change</button></div>
          ) : (
            <>
              <input type="text" placeholder="Search cities…" value={filter} onChange={(e) => setFilter(e.target.value)} style={{ marginBottom: 8 }} />
              <div className="chiprow" style={{ maxHeight: 150, overflowY: "auto" }}>
                {cityList.slice(0, 10).map((c) => (
                  <button key={c.name} className="chip" onClick={() => setCity(c)}>{c.name}</button>
                ))}
              </div>
              <label className="fld" style={{ marginTop: 12 }}>Not listed? Enter coordinates</label>
              <div className="row">
                <input type="text" placeholder="Name" value={custom.name} onChange={(e) => setCustom({ ...custom, name: e.target.value })} className="grow" />
                <input type="number" placeholder="Lat" value={custom.lat} onChange={(e) => setCustom({ ...custom, lat: e.target.value })} style={{ width: 90 }} />
                <input type="number" placeholder="Lng" value={custom.lng} onChange={(e) => setCustom({ ...custom, lng: e.target.value })} style={{ width: 90 }} />
              </div>
            </>
          )}
          <div className="mini" style={{ marginTop: 8 }}>Times use your device's timezone — keep it matched to this city.</div>
        </div>

        <div className="card">
          <div className="row">
            <div className="grow"><label className="fld">Calculation method</label>
              <select value={method} onChange={(e) => setMethod(e.target.value)}>
                {Object.entries(METHODS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
              </select></div>
            <div className="grow"><label className="fld">Asr</label>
              <select value={asrFactor} onChange={(e) => setAsrFactor(Number(e.target.value))}>
                <option value={1}>Standard</option><option value={2}>Hanafi</option>
              </select></div>
          </div>
        </div>

        <div className="card">
          <label className="fld">Default wake / asleep-by (editable nightly)</label>
          <div className="row">
            <input type="time" value={wake} onChange={(e) => setWake(e.target.value)} className="grow" />
            <input type="time" value={sleep} onChange={(e) => setSleep(e.target.value)} className="grow" />
          </div>
        </div>

        <div className="card reclist">
          <label className="fld">Recurring weekly commitments</label>
          {rec.map((c) => (
            <div className="row" key={c.id}>
              <div className="grow">{c.title}<div className="mini">{c.days.map((d) => DAYS[d]).join(" ")} · {fmt(fromInputVal(c.start))}–{fmt(fromInputVal(c.end))}</div></div>
              <button className="chip" onClick={() => setRec(rec.filter((x) => x.id !== c.id))}>Remove</button>
            </div>
          ))}
          <div style={{ marginTop: 10 }}>
            <input type="text" placeholder="Title (e.g. IBRI internship, Cold Plunge shift)" value={nr.title} onChange={(e) => setNr({ ...nr, title: e.target.value })} style={{ marginBottom: 8 }} />
            <div className="chiprow" style={{ marginBottom: 8 }}>
              {DAYS.map((d, i) => (
                <button key={d} className={`chip ${nr.days.includes(i) ? "on" : ""}`}
                  onClick={() => setNr({ ...nr, days: nr.days.includes(i) ? nr.days.filter((x) => x !== i) : [...nr.days, i] })}>{d}</button>
              ))}
            </div>
            <div className="row" style={{ marginBottom: 8 }}>
              <input type="time" value={nr.start} onChange={(e) => setNr({ ...nr, start: e.target.value })} className="grow" />
              <input type="time" value={nr.end} onChange={(e) => setNr({ ...nr, end: e.target.value })} className="grow" />
              <button className="chip" onClick={addRec}>Add</button>
            </div>
          </div>
        </div>

        <div className="card">
          <label className="fld">Baked-in preferences (applied automatically)</label>
          <div className="mini" style={{ lineHeight: 1.7 }}>
            Five prayers anchor the day, with wudu buffers · deep work in high-energy windows ·
            fitness spaced from meals · whole-food meals, never rushed · a daylight/movement break ·
            screen-free wind-down · sleep is protected · 5-min transitions between everything
          </div>
        </div>

        <button className="btn" onClick={done} disabled={!city && !(custom.name && custom.lat && custom.lng)}
          style={{ opacity: city || (custom.name && custom.lat && custom.lng) ? 1 : 0.4 }}>
          {firstRun ? "Save & start planning" : "Save settings"}
        </button>

        {!firstRun && (
          <div className="card" style={{ marginTop: 12 }}>
            <label className="fld">Account & data</label>
            {accountEmail && <div className="mini" style={{ marginBottom: 10 }}>Signed in as {accountEmail} — data syncs to every device you sign in on.</div>}
            <div className="row">
              <button className="btn ghost grow" onClick={onExport}>Download backup</button>
              <button className="btn ghost grow" onClick={onSignOut}>Sign out</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


/* ============================================================
   SIGN IN / CREATE ACCOUNT
   ============================================================ */
function AuthView({ css, onSignedIn }) {
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [msg, setMsg] = useState("");
  const [busy, setBusy] = useState(false);

  const go = async (mode) => {
    if (!email || pw.length < 6) { setMsg("Enter your email and a password of at least 6 characters."); return; }
    setBusy(true); setMsg("");
    const client = getClient();
    try {
      const { data, error } = mode === "up"
        ? await client.auth.signUp({ email, password: pw })
        : await client.auth.signInWithPassword({ email, password: pw });
      setBusy(false);
      if (error) { setMsg(error.message); return; }
      if (mode === "up" && data.user && !data.session) { setMsg("Account created — check your email for a confirmation link, then come back and sign in."); return; }
      onSignedIn();
    } catch (e) { setBusy(false); setMsg("Could not reach the server — check your connection."); }
  };

  return (
    <div className="btp"><style>{css}</style>
      <div className="wrap" style={{ paddingTop: 40 }}>
        <div className="brand" style={{ marginBottom: 20 }}>block<em>·</em>time</div>
        <div className="eyebrow">Your account</div>
        <h2>Sign in once per device</h2>
        <div className="sub">Your settings and plans sync to any device you sign in on. You stay signed in after this.</div>
        <div className="card">
          <label className="fld">Email</label>
          <input type="text" inputMode="email" autoCapitalize="none" value={email} onChange={(e) => setEmail(e.target.value.trim())} style={{ marginBottom: 10 }} />
          <label className="fld">Password (6+ characters)</label>
          <input type="password" value={pw} onChange={(e) => setPw(e.target.value)} />
          {msg && <div className="mini" style={{ color: "#E3A857", marginTop: 10 }}>{msg}</div>}
        </div>
        <button className="btn" onClick={() => go("in")} disabled={busy} style={{ marginBottom: 10, opacity: busy ? 0.6 : 1 }}>Sign in</button>
        <button className="btn ghost" onClick={() => go("up")} disabled={busy}>Create account</button>
        <div className="mini" style={{ marginTop: 14 }}>First time here? Use "Create account" with any email + password you'll remember. Same email + password on your other devices.</div>
      </div>
    </div>
  );
}

/* ============================================================
   CONNECT — only shown if the two config lines weren't filled in
   ============================================================ */
function ConnectView({ css, onDone }) {
  const [url, setUrl] = useState("");
  const [key, setKey] = useState("");
  return (
    <div className="btp"><style>{css}</style>
      <div className="wrap" style={{ paddingTop: 40 }}>
        <div className="brand" style={{ marginBottom: 20 }}>block<em>·</em>time</div>
        <div className="eyebrow">One-time connection</div>
        <h2>Connect your Supabase project</h2>
        <div className="sub">Tip: it's easier to paste these two values into the top of index.html on GitHub (look for SUPABASE_URL) — then this screen never appears. But you can also enter them here for this device.</div>
        <div className="card">
          <label className="fld">Project URL (https://xxxx.supabase.co)</label>
          <input type="text" autoCapitalize="none" value={url} onChange={(e) => setUrl(e.target.value.trim())} style={{ marginBottom: 10 }} />
          <label className="fld">Anon public key (long string starting with "ey")</label>
          <input type="text" autoCapitalize="none" value={key} onChange={(e) => setKey(e.target.value.trim())} />
        </div>
        <button className="btn" onClick={() => url.startsWith("https://") && key.length > 20 && onDone({ url, key })}
          style={{ opacity: url.startsWith("https://") && key.length > 20 ? 1 : 0.4 }}>Connect</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
